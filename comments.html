<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — የተሻገረ ሰው</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #d4a017;
      --gold-light: #f0c040;
      --teal: #4ecdc4;
      --dark: #0f0a04;
      --dark2: #1a1106;
      --dark3: #231808;
      --text: #f5e9cf;
      --text-muted: #a89070;
    }

    body {
      font-family: 'Inter', 'Noto Sans Ethiopic', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .page-header {
      text-align: center;
      padding: 60px 20px 40px;
      position: relative;
      border-bottom: 1px solid rgba(212,160,23,0.1);
    }

    .page-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 80% at 50% 0%, rgba(212,160,23,0.08), transparent 70%);
      pointer-events: none;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 28px;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .back-link:hover { opacity: 1; }

    .page-title {
      font-family: 'Noto Sans Ethiopic', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .page-sub {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .count-badge {
      display: inline-block;
      background: rgba(212,160,23,0.12);
      border: 1px solid rgba(212,160,23,0.25);
      color: var(--gold);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 4px 14px;
      border-radius: 999px;
      margin-top: 14px;
    }

    /* ── MAIN ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .search-input {
      background: var(--dark2);
      border: 1px solid rgba(212,160,23,0.2);
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      flex: 1;
      min-width: 160px;
      transition: border-color 0.3s;
    }

    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: rgba(212,160,23,0.5); }

    .sort-btn {
      background: var(--dark2);
      border: 1px solid rgba(212,160,23,0.2);
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.3s, color 0.3s;
    }

    .sort-btn:hover { border-color: rgba(212,160,23,0.5); color: var(--gold); }

    /* ── STATES ── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(212,160,23,0.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }

    /* ── COMMENT CARDS ── */
    .comments-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .comment-card {
      background: linear-gradient(145deg, var(--dark3), var(--dark2));
      border: 1px solid rgba(212,160,23,0.12);
      border-radius: 16px;
      padding: 22px 24px;
      animation: fadeUp 0.4s ease both;
      transition: border-color 0.3s;
    }

    .comment-card:hover { border-color: rgba(212,160,23,0.3); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .comment-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .avatar {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--teal));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: var(--dark);
    }

    .comment-meta { flex: 1; }

    .comment-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 2px;
    }

    .comment-time {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .comment-body {
      font-family: 'Noto Sans Ethiopic', 'Inter', sans-serif;
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--text);
      word-break: break-word;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 30px 20px;
      border-top: 1px solid rgba(212,160,23,0.1);
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    @media (max-width: 480px) {
      .toolbar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <div><a class="back-link" href="index.html">← Back to Event</a></div>
  <h1 class="page-title">Messages · አስተያየቶች</h1>
  <p class="page-sub">የተሻገረ ሰው · Goro Apostolic Church</p>
  <div class="count-badge" id="countBadge">Loading...</div>
</div>

<main>
  <div class="toolbar">
    <input class="search-input" type="text" id="searchInput" placeholder="Search messages..." />
    <button class="sort-btn" id="sortBtn">Newest first ↓</button>
  </div>
  <div id="output">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading messages...</p>
    </div>
  </div>
</main>

<footer>
  <p>የተሻገረ ሰው · ሚያዝያ 3, 2018 · Goro Apostolic Church</p>
</footer>

<script>
  // 🔧 REPLACE these with your own values (same as index.html)
  const GH_OWNER  = 'YOUR_GITHUB_USERNAME';
  const GH_REPO   = 'YOUR_REPO_NAME';
  const FILE_PATH = 'comments.json';

  // Read comments using the raw GitHub URL — no token needed for public repos
  const RAW_URL = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${FILE_PATH}`;

  let allComments = [];
  let newestFirst = true;

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleString('en-GB', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderComments(list) {
    const output = document.getElementById('output');
    if (list.length === 0) {
      output.innerHTML = `
        <div class="empty-state">
          <div class="emoji">💬</div>
          <p>No messages yet. Be the first to leave one!</p>
        </div>`;
      return;
    }

    output.innerHTML = `<div class="comments-list">${
      list.map((c, i) => `
        <div class="comment-card" style="animation-delay:${i * 0.05}s">
          <div class="comment-header">
            <div class="avatar">${initials(c.name)}</div>
            <div class="comment-meta">
              <div class="comment-name">${escHtml(c.name)}</div>
              <div class="comment-time">${formatTime(c.timestamp)}</div>
            </div>
          </div>
          <div class="comment-body">${escHtml(c.message)}</div>
        </div>`)
      .join('')
    }</div>`;
  }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let list = [...allComments];
    if (q) list = list.filter(c =>
      c.name.toLowerCase().includes(q) || c.message.toLowerCase().includes(q)
    );
    if (newestFirst) list = [...list].reverse();
    renderComments(list);
  }

  async function loadComments() {
    try {
      // Add cache-busting to always get the latest file
      const res = await fetch(`${RAW_URL}?t=${Date.now()}`);
      if (res.status === 404) {
        allComments = [];
      } else if (!res.ok) {
        throw new Error();
      } else {
        allComments = await res.json();
      }

      const count = allComments.length;
      document.getElementById('countBadge').textContent =
        count === 0 ? 'No messages yet'
        : count === 1 ? '1 message'
        : `${count} messages`;

      applyFilters();
    } catch {
      document.getElementById('output').innerHTML = `
        <div class="empty-state">
          <div class="emoji">⚠️</div>
          <p>Could not load messages. Check GH_OWNER and GH_REPO.</p>
        </div>`;
      document.getElementById('countBadge').textContent = 'Error';
    }
  }

  document.getElementById('sortBtn').addEventListener('click', () => {
    newestFirst = !newestFirst;
    document.getElementById('sortBtn').textContent =
      newestFirst ? 'Newest first ↓' : 'Oldest first ↑';
    applyFilters();
  });

  document.getElementById('searchInput').addEventListener('input', applyFilters);

  loadComments();
</script>
</body>
</html>
